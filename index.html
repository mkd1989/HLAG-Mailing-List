<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hit Like A Girl Mailing List</title>
  <script src="main.js" defer></script>
  <link rel="stylesheet" href="style.css">
  <!-- gaegu -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400&display=swap" rel="stylesheet">
  <!-- sono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sono:wght@200..800&display=swap" rel="stylesheet">

</head>
<body>
  <header>
    
  </header>
  
<!--------------------- Contact/Mailing List Page-------------- -->
    <section id="contact" class="contact-section">
        <div class="contact-container">
            <h2>HLAG Mailing List</h2>
            
            
            <div class="mailing-list">
                <div id="signupFormContainer">
                    <h3>join our mailing list to get updates on shows, new releases, and more, directly from us!</h3>
                    
                    
                    <form id="mailingListForm" class="signup-form">
                        <input 
                            type="email" 
                            name="email" 
                            id="emailInput"
                            placeholder="Your email" 
                            required>
                        <input 
                            type="text" 
                            name="name" 
                            id="nameInput"
                            placeholder="Your name (optional)">
                        <button type="submit">Sign Up</button>
                    </form>
                    
                    <div id="formMessage" class="form-message"></div>
                </div>
                
                <div id="thankYouMessage" class="thank-you-message">
                    <h3>Thanks for signing up!</h3>
                    <p>Keep an eye out for future updates from us!</p>
                </div>
            </div>
        </div>
    </section>
  </main>

  
</body>
</html>
